<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkPad - إنشاء حساب</title>
    <style>
        :root {
            --bg-color: #02414d;
            --accent-color: #08f169;
            --card-bg: #ffffff;
            --text-dark: #333;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--bg-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 350px;
            text-align: center;
        }

        .card h2 {
            color: var(--bg-color);
            margin-bottom: 25px;
        }

        .input-group {
            margin-bottom: 15px;
            text-align: right;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-sizing: border-box; /* مهم جداً لضبط العرض */
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--bg-color);
            box-shadow: 0 0 5px rgba(2, 65, 77, 0.2);
        }

        button {
            width: 100%;
            padding: 12px;
            background: var(--accent-color);
            color: var(--bg-color);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            margin-top: 10px;
            transition: 0.3s;
        }

        button:hover {
            filter: brightness(0.9);
            transform: translateY(-2px);
        }

        #msg {
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 10px;
            display: none;
            font-size: 14px;
        }

        .ok { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; display: block !important; }
        .err { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; display: block !important; }

        .footer-links {
            margin-top: 20px;
            font-size: 14px;
            color: #666;
        }

        .footer-links a {
            color: var(--bg-color);
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>إنشاء حساب LinkPad</h2>
        
        <div id="msg"></div>

        <div class="input-group">
            <input id="u" type="text" placeholder="اسم المستخدم">
        </div>

        <div class="input-group">
            <input type="email" id="email" placeholder="البريد الإلكتروني" required>
        </div>

        <div class="input-group">
            <input id="p" type="password" placeholder="كلمة المرور">
        </div>

        <button type="button" onclick="reg()">إنشاء الحساب</button>

        <div class="footer-links">
            لديك حساب بالفعل؟ <a href="login.html">سجل دخولك</a>
        </div>
    </div>

    <script>
        async function reg() {
            const u = document.getElementById('u').value.trim();
            const p = document.getElementById('p').value.trim();
            const email = document.getElementById('email').value.trim();
            const m = document.getElementById('msg');

            if (!u || !p || !email) {
                m.className = 'err';
                m.innerText = "يرجى ملء جميع الحقول";
                return;
            }

            try {
                const res = await fetch('/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p, email: email })
                });

                if (res.ok) {
                    m.className = 'ok';
                    m.innerText = "تم التسجيل بنجاح! جاري التحويل...";
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 1500);
                } else {
                    const data = await res.json();
                    m.className = 'err';
                    m.innerText = data.error || "فشل التسجيل، حاول مرة أخرى";
                }
            } catch (e) {
                m.className = 'err';
                m.innerText = "فشل الاتصال بالسيرفر";
            }
        }
    </script>
</body>
</html>
