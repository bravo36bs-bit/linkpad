<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Falcon Meet</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
    --bg:    #080d0d;
    --card:  #0f1a1a;
    --border:#1c3333;
    --teal:  #009999;
    --teal2: #00cccc;
    --text:  #dff0f0;
    --muted: #4d8080;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
    font-family:'Tajawal',sans-serif;
    background:var(--bg);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
}

/* خلفية */
.bg {
    position:fixed; inset:0; z-index:0; overflow:hidden;
}
.bg::before {
    content:'';
    position:absolute;
    width:600px; height:600px;
    border-radius:50%;
    background:radial-gradient(circle, rgba(0,153,153,.12), transparent 70%);
    top:-150px; right:-150px;
    animation:pulse 6s ease-in-out infinite;
}
.bg::after {
    content:'';
    position:absolute;
    width:400px; height:400px;
    border-radius:50%;
    background:radial-gradient(circle, rgba(0,153,153,.08), transparent 70%);
    bottom:-100px; left:-100px;
    animation:pulse 6s ease-in-out infinite 3s;
}
@keyframes pulse {
    0%,100% { transform:scale(1); }
    50%      { transform:scale(1.1); }
}

.wrap {
    position:relative; z-index:1;
    width:100%; max-width:400px;
    padding:20px;
}

/* Logo */
.logo {
    text-align:center;
    margin-bottom:35px;
    animation:fadeDown .5s ease;
}
.logo .falcon { font-size:2.8rem; margin-bottom:6px; }
.logo h1 {
    font-size:2rem; font-weight:900;
    background:linear-gradient(135deg, var(--teal), var(--teal2));
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    letter-spacing:-0.5px;
}
.logo p { color:var(--muted); font-size:.88rem; margin-top:4px; }

@keyframes fadeDown {
    from { opacity:0; transform:translateY(-15px); }
    to   { opacity:1; transform:translateY(0); }
}

/* Card */
.card {
    background:var(--card);
    border:1px solid var(--border);
    border-radius:20px;
    padding:30px;
    box-shadow:0 25px 60px rgba(0,0,0,.5);
    animation:fadeUp .5s ease .1s both;
}
@keyframes fadeUp {
    from { opacity:0; transform:translateY(15px); }
    to   { opacity:1; transform:translateY(0); }
}

/* Tabs */
.tabs {
    display:flex;
    background:var(--bg);
    border-radius:12px;
    padding:4px;
    gap:4px;
    margin-bottom:25px;
}
.tab {
    flex:1; padding:9px;
    border:none; border-radius:9px;
    cursor:pointer;
    font-family:'Tajawal',sans-serif;
    font-size:.9rem; font-weight:600;
    transition:all .3s;
    background:transparent;
    color:var(--muted);
}
.tab.active {
    background:var(--teal);
    color:#fff;
    box-shadow:0 3px 12px rgba(0,153,153,.4);
}

/* Fields */
.field { margin-bottom:16px; }
.field label { display:block; color:var(--muted); font-size:.82rem; margin-bottom:7px; }
.field input {
    width:100%; padding:13px 15px;
    background:var(--bg);
    border:1px solid var(--border);
    border-radius:11px;
    color:var(--text);
    font-family:'Tajawal',sans-serif;
    font-size:.95rem;
    outline:none;
    transition:border-color .2s, box-shadow .2s;
}
.field input:focus {
    border-color:var(--teal);
    box-shadow:0 0 0 3px rgba(0,153,153,.12);
}
.field input::placeholder { color:#1e3333; }

/* Button */
.btn {
    width:100%; padding:14px;
    background:var(--teal);
    color:#fff; border:none;
    border-radius:11px;
    font-family:'Tajawal',sans-serif;
    font-size:1rem; font-weight:700;
    cursor:pointer;
    transition:all .25s;
    margin-top:4px;
}
.btn:hover:not(:disabled) {
    background:var(--teal2);
    transform:translateY(-2px);
    box-shadow:0 8px 22px rgba(0,153,153,.4);
}
.btn:disabled { opacity:.55; cursor:not-allowed; }

/* Message */
.msg {
    margin-top:14px;
    padding:11px 14px;
    border-radius:10px;
    font-size:.87rem;
    text-align:center;
    display:none;
}
.msg.err  { background:rgba(255,60,60,.08); color:#ff7070; border:1px solid rgba(255,60,60,.2); }
.msg.ok   { background:rgba(0,153,153,.1);  color:var(--teal2); border:1px solid rgba(0,153,153,.2); }
.msg.show { display:block; animation:fadeUp .3s ease; }

/* Form sections */
.section { display:none; }
.section.active { display:block; }
</style>
</head>
<body>
<div class="bg"></div>
<div class="wrap">
    <div class="logo">
        <div class="falcon">🦅</div>
        <h1>Falcon Meet</h1>
        <p>تواصل بسرعة الصقر</p>
    </div>

    <div class="card">
        <div class="tabs">
            <button class="tab active" onclick="switchTab('login')">تسجيل الدخول</button>
            <button class="tab"        onclick="switchTab('signup')">حساب جديد</button>
        </div>

        <!-- Login -->
        <div class="section active" id="loginSection">
            <div class="field">
                <label>اسم المستخدم</label>
                <input id="lUser" type="text" placeholder="أدخل اسم المستخدم" autocomplete="username">
            </div>
            <div class="field">
                <label>كلمة السر</label>
                <input id="lPass" type="password" placeholder="أدخل كلمة السر"
                    onkeypress="if(event.key==='Enter')login()">
            </div>
            <button class="btn" id="lBtn" onclick="login()">دخول</button>
        </div>

        <!-- Signup -->
        <div class="section" id="signupSection">
            <div class="field">
                <label>اسم المستخدم</label>
                <input id="sUser" type="text" placeholder="اختر اسم مستخدم (3 أحرف+)">
            </div>
            <div class="field">
                <label>كلمة السر</label>
                <input id="sPass" type="password" placeholder="اختر كلمة سر (4 أحرف+)"
                    onkeypress="if(event.key==='Enter')signup()">
            </div>
            <button class="btn" id="sBtn" onclick="signup()">إنشاء الحساب</button>
        </div>

        <div class="msg" id="msg"></div>
    </div>
</div>

<script>
const API = 'https://linkpad-chat.onrender.com';

if (localStorage.getItem('token')) location.href = 'dashboard.html';

function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t,i) =>
        t.classList.toggle('active', (tab==='login'&&i===0)||(tab==='signup'&&i===1))
    );
    document.getElementById('loginSection').classList.toggle('active', tab==='login');
    document.getElementById('signupSection').classList.toggle('active', tab==='signup');
    hideMsg();
}

function showMsg(text, type) {
    const el = document.getElementById('msg');
    el.textContent = text;
    el.className = `msg ${type} show`;
}
function hideMsg() { document.getElementById('msg').className = 'msg'; }

async function login() {
    const username = document.getElementById('lUser').value.trim();
    const password = document.getElementById('lPass').value;
    const btn      = document.getElementById('lBtn');
    if (!username || !password) return showMsg('يرجى ملء جميع الحقول', 'err');

    btn.disabled = true; btn.textContent = 'جاري التحقق...'; hideMsg();
    try {
        const res  = await fetch(`${API}/login`, {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (res.ok && data.token) {
            localStorage.setItem('token', data.token);
            showMsg('تم الدخول! جاري التحويل...', 'ok');
            setTimeout(() => location.href = 'dashboard.html', 700);
        } else {
            showMsg(data.error || 'خطأ في البيانات', 'err');
            btn.disabled = false; btn.textContent = 'دخول';
        }
    } catch {
        showMsg('تعذر الاتصال بالسيرفر', 'err');
        btn.disabled = false; btn.textContent = 'دخول';
    }
}

async function signup() {
    const username = document.getElementById('sUser').value.trim();
    const password = document.getElementById('sPass').value;
    const btn      = document.getElementById('sBtn');
    if (!username || !password) return showMsg('يرجى ملء جميع الحقول', 'err');

    btn.disabled = true; btn.textContent = 'جاري الإنشاء...'; hideMsg();
    try {
        const res  = await fetch(`${API}/signup`, {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (res.ok) {
            showMsg('تم إنشاء الحساب! يمكنك تسجيل الدخول الآن', 'ok');
            setTimeout(() => switchTab('login'), 1500);
        } else {
            showMsg(data.error || 'خطأ في الإنشاء', 'err');
        }
    } catch {
        showMsg('تعذر الاتصال بالسيرفر', 'err');
    }
    btn.disabled = false; btn.textContent = 'إنشاء الحساب';
}
</script>
</body>
</html>
