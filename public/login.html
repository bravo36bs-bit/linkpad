<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Falcon Office - الدخول والتسجيل</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #2d2d2d; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 350px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; background: #3d3d3d; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; background: #ffcc00; color: #1a1a1a; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .toggle-link { color: #ffcc00; cursor: pointer; font-size: 14px; margin-top: 15px; display: block; text-decoration: underline; }
        .error { color: #ff4444; font-size: 13px; margin-top: 10px; min-height: 18px; }
        .success { color: #44ff44; font-size: 13px; margin-top: 10px; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="card">
        <div id="login-section">
            <h2>تسجيل الدخول</h2>
            <input type="text" id="login-user" placeholder="اسم المستخدم">
            <input type="password" id="login-pass" placeholder="كلمة المرور">
            <button onclick="handleAuth('/login', 'login')">دخول</button>
            <span class="toggle-link" onclick="toggleAuth()">ليس لديك حساب؟ إنشاء حساب جديد</span>
        </div>
        <div id="register-section" class="hidden">
            <h2>إنشاء حساب جديد</h2>
            <input type="text" id="reg-user" placeholder="اختر اسم مستخدم">
            <input type="password" id="reg-pass" placeholder="اختر كلمة مرور">
            <button onclick="handleAuth('/register', 'reg')">تسجيل الحساب</button>
            <span class="toggle-link" onclick="toggleAuth()">لديك حساب بالفعل؟ سجل دخولك</span>
        </div>
        <div id="msg" class="error"></div>
    </div>
    <script>
        const API = window.location.origin; 
        function toggleAuth() {
            document.getElementById('login-section').classList.toggle('hidden');
            document.getElementById('register-section').classList.toggle('hidden');
            document.getElementById('msg').innerText = '';
        }
        async function handleAuth(endpoint, prefix) {
            const user = document.getElementById(`${prefix}-user`).value;
            const pass = document.getElementById(`${prefix}-pass`).value;
            const msgDiv = document.getElementById('msg');
            if(!user || !pass) { msgDiv.innerText = 'يرجى ملء كافة الحقول'; return; }
            try {
                const response = await fetch(`${API}${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });
                const data = await response.json();
                if (response.ok) {
                    if (endpoint === '/login') {
                        localStorage.setItem('fo_token', data.token);
                        localStorage.setItem('fo_user', JSON.stringify(data.user));
                        window.location.href = 'dashboard.html';
                    } else {
                        msgDiv.className = 'success';
                        msgDiv.innerText = 'تم إنشاء الحساب بنجاح! يمكنك الدخول الآن.';
                        setTimeout(toggleAuth, 2000);
                    }
                } else { msgDiv.innerText = data.error; }
            } catch (err) { msgDiv.innerText = 'فشل الاتصال بالسيرفر'; }
        }
    </script>
</body>
</html>
