<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>LinkPad - دردشة</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root {
            --teal: #008080;
            --teal-dark: #005f5f;
            --teal-light: #00b3b3;
            --bg: #0a0f0f;
            --card: #111a1a;
            --card2: #0d1515;
            --border: #1a2e2e;
            --text: #e8f4f4;
            --muted: #5a8a8a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); color: var(--text); height: 100dvh; display: flex; overflow: hidden; }

        /* ===== Sidebar ===== */
        .sidebar { width: 280px; background: var(--card); border-left: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; transition: transform 0.3s; }
        .sidebar-header { padding: 15px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
        .sidebar-header h2 { font-size: 1.3rem; font-weight: 900; color: var(--teal-light); }
        .sidebar-actions { display: flex; gap: 8px; align-items: center; }
        .icon-btn { background: none; border: 1px solid var(--border); color: var(--muted); width: 34px; height: 34px; border-radius: 8px; cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; transition: all 0.2s; position: relative; }
        .icon-btn:hover { border-color: var(--teal); color: var(--teal-light); }
        .badge { position: absolute; top: -5px; left: -5px; background: #ff4444; color: white; border-radius: 50%; width: 16px; height: 16px; font-size: 0.65rem; display: flex; align-items: center; justify-content: center; display: none; }
        .my-info { padding: 12px 20px; background: var(--card2); border-bottom: 1px solid var(--border); font-size: 0.85rem; color: var(--muted); }
        .my-info span { color: var(--teal-light); font-weight: 700; }
        .section-title { padding: 12px 20px 8px; font-size: 0.75rem; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
        .friends-list { flex: 1; overflow-y: auto; padding: 0 10px 10px; }
        .friends-list::-webkit-scrollbar { width: 3px; }
        .friends-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        .friend-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 12px; cursor: pointer; transition: all 0.2s; margin-bottom: 3px; }
        .friend-item:hover { background: var(--card2); }
        .friend-item.active { background: rgba(0,128,128,0.15); border: 1px solid rgba(0,128,128,0.3); }
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--teal-dark); display: flex; align-items: center; justify-content: center; font-size: 1rem; font-weight: 700; color: white; flex-shrink: 0; }
        .friend-info { flex: 1; min-width: 0; }
        .friend-name { font-size: 0.9rem; font-weight: 500; }
        .unread { background: var(--teal); color: white; border-radius: 50%; width: 18px; height: 18px; font-size: 0.65rem; display: flex; align-items: center; justify-content: center; display: none; }
        .empty-list { text-align: center; color: var(--muted); padding: 25px 15px; font-size: 0.85rem; line-height: 1.8; }

        /* ===== Search Panel ===== */
        .panel { position: absolute; top: 0; right: 0; width: 280px; height: 100%; background: var(--card); border-left: 1px solid var(--border); z-index: 200; transform: translateX(100%); transition: transform 0.3s; display: flex; flex-direction: column; }
        .panel.open { transform: translateX(0); }
        .panel-header { padding: 15px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
        .panel-header h3 { font-size: 1rem; font-weight: 700; }
        .close-btn { background: none; border: none; color: var(--muted); font-size: 1.2rem; cursor: pointer; }
        .search-input { margin: 15px; padding: 10px 15px; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: 'Tajawal', sans-serif; font-size: 0.9rem; outline: none; }
        .search-input:focus { border-color: var(--teal); }
        .search-results { flex: 1; overflow-y: auto; padding: 0 15px; }
        .search-item { display: flex; align-items: center; gap: 10px; padding: 10px; border-radius: 10px; margin-bottom: 5px; }
        .search-item .avatar { width: 36px; height: 36px; font-size: 0.9rem; }
        .search-item span { flex: 1; font-size: 0.9rem; }
        .add-btn { background: var(--teal); border: none; color: white; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-family: 'Tajawal', sans-serif; font-size: 0.8rem; transition: all 0.2s; }
        .add-btn:hover { background: var(--teal-light); }
        .add-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* ===== Requests Panel ===== */
        .request-item { display: flex; align-items: center; gap: 10px; padding: 12px; border-radius: 10px; margin-bottom: 8px; background: var(--card2); }
        .request-item .avatar { width: 36px; height: 36px; font-size: 0.9rem; }
        .request-item span { flex: 1; font-size: 0.9rem; }
        .req-btns { display: flex; gap: 5px; }
        .accept-btn { background: var(--teal); border: none; color: white; padding: 5px 10px; border-radius: 7px; cursor: pointer; font-family: 'Tajawal', sans-serif; font-size: 0.8rem; }
        .reject-btn { background: none; border: 1px solid #ff4444; color: #ff4444; padding: 5px 10px; border-radius: 7px; cursor: pointer; font-family: 'Tajawal', sans-serif; font-size: 0.8rem; }

        /* ===== Chat Area ===== */
        .chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .welcome-screen { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--muted); gap: 12px; }
        .welcome-screen .icon { font-size: 3.5rem; }
        .welcome-screen h3 { font-size: 1.1rem; color: var(--text); }
        .chat-header { padding: 15px 20px; background: var(--card); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; display: none; }
        .chat-header .avatar { width: 36px; height: 36px; font-size: 0.9rem; }
        .chat-header-name { font-weight: 700; }
        .back-btn { display: none; background: none; border: none; color: var(--muted); font-size: 1.2rem; cursor: pointer; margin-left: auto; }
        .messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 6px; display: none; }
        .messages::-webkit-scrollbar { width: 3px; }
        .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        /* الرسائل */
        .msg-wrapper { display: flex; flex-direction: column; }
        .msg-wrapper.mine { align-items: flex-start; }
        .msg-wrapper.other { align-items: flex-end; }
        .message { max-width: 70%; padding: 9px 13px; border-radius: 16px; font-size: 0.9rem; line-height: 1.5; animation: msgIn 0.2s ease; word-break: break-word; position: relative; cursor: pointer; }
        .message:hover .delete-btn { display: flex; }
        @keyframes msgIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        .msg-wrapper.mine .message { background: var(--teal); color: white; border-bottom-right-radius: 4px; }
        .msg-wrapper.other .message { background: var(--card); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
        .msg-meta { display: flex; align-items: center; gap: 5px; margin-top: 3px; padding: 0 4px; }
        .msg-time { font-size: 0.68rem; color: var(--muted); }
        .seen-icon { font-size: 0.75rem; color: var(--teal-light); }
        .delete-btn { display: none; position: absolute; top: -10px; left: -10px; background: #ff4444; border: none; color: white; width: 22px; height: 22px; border-radius: 50%; cursor: pointer; font-size: 0.7rem; align-items: center; justify-content: center; }

        /* حقل الإرسال */
        .input-area { padding: 12px 15px; background: var(--card); border-top: 1px solid var(--border); display: flex; gap: 8px; align-items: center; display: none; }
        .input-area input { flex: 1; padding: 11px 16px; background: var(--bg); border: 1px solid var(--border); border-radius: 22px; color: var(--text); font-family: 'Tajawal', sans-serif; font-size: 0.9rem; outline: none; transition: border-color 0.2s; }
        .input-area input:focus { border-color: var(--teal); }
        .input-area input::placeholder { color: #2a4a4a; }
        .send-btn { width: 42px; height: 42px; border-radius: 50%; background: var(--teal); border: none; color: white; font-size: 1.1rem; cursor: pointer; transition: all 0.2s; flex-shrink: 0; }
        .send-btn:hover { background: var(--teal-light); transform: scale(1.05); }

        /* Toast */
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--card); border: 1px solid var(--teal); color: var(--text); padding: 10px 20px; border-radius: 10px; font-size: 0.85rem; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
        .toast.show { opacity: 1; }

        /* موبايل */
        @media (max-width: 600px) {
            .sidebar { position: fixed; top: 0; right: 0; height: 100%; z-index: 100; }
            .sidebar.hidden { transform: translateX(100%); }
            .back-btn { display: flex !important; }
            .panel { width: 100%; }
        }
    </style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <h2>LinkPad</h2>
        <div class="sidebar-actions">
            <!-- طلبات الصداقة -->
            <button class="icon-btn" onclick="togglePanel('requestsPanel')" title="طلبات الصداقة">
                🔔
                <span class="badge" id="requestsBadge">0</span>
            </button>
            <!-- إضافة صديق -->
            <button class="icon-btn" onclick="togglePanel('searchPanel')" title="إضافة صديق">➕</button>
            <!-- خروج -->
            <button class="icon-btn" onclick="logout()" title="خروج" style="border-color:#ff4444; color:#ff4444;">⏻</button>
        </div>
    </div>
    <div class="my-info">أنت: <span id="my-name">...</span></div>
    <div class="section-title">الأصدقاء</div>
    <div class="friends-list" id="friendsList">
        <div class="empty-list">ما عندك أصدقاء بعد<br>اضغط ➕ لإضافة صديق</div>
    </div>
</div>

<!-- Panel البحث -->
<div class="panel" id="searchPanel">
    <div class="panel-header">
        <h3>إضافة صديق</h3>
        <button class="close-btn" onclick="togglePanel('searchPanel')">✕</button>
    </div>
    <input class="search-input" id="searchInput" placeholder="ابحث عن مستخدم..." oninput="searchUsers()">
    <div class="search-results" id="searchResults"></div>
</div>

<!-- Panel طلبات الصداقة -->
<div class="panel" id="requestsPanel">
    <div class="panel-header">
        <h3>طلبات الصداقة</h3>
        <button class="close-btn" onclick="togglePanel('requestsPanel')">✕</button>
    </div>
    <div class="search-results" id="requestsList" style="padding-top:10px;"></div>
</div>

<!-- Chat Area -->
<div class="chat-area">
    <div class="welcome-screen" id="welcomeScreen">
        <div class="icon">💬</div>
        <h3>اختر صديقاً للدردشة</h3>
        <p style="font-size:0.85rem;">اختر من القائمة على اليمين</p>
    </div>
    <div class="chat-header" id="chatHeader">
        <div class="avatar" id="friendAvatar"></div>
        <div class="chat-header-name" id="friendName"></div>
        <button class="back-btn" onclick="showSidebar()">→</button>
    </div>
    <div class="messages" id="messages"></div>
    <div class="input-area" id="inputArea">
        <input id="msgInput" placeholder="اكتب رسالتك..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button class="send-btn" onclick="sendMessage()">↑</button>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    const API_URL = 'https://linkpad-chat.onrender.com';
    const token = localStorage.getItem('token');
    if (!token) window.location.href = 'login.html';

    let myId, myName;
    try {
        const payload = JSON.parse(atob(token.split('.')[1]));
        myId = payload.id;
        myName = payload.username;
        document.getElementById('my-name').textContent = myName;
    } catch { window.location.href = 'login.html'; }

    let currentFriend = null;
    let socket = null;

    // ===== Socket.io =====
    function connectSocket() {
        socket = io(API_URL);
        socket.on('connect', () => socket.emit('register', myId));

        socket.on('receive_message', (msg) => {
            if (currentFriend && (msg.sender_id == currentFriend.id || msg.receiver_id == currentFriend.id)) {
                appendMessage(msg);
            }
        });

        socket.on('message_deleted', ({ id }) => {
            const el = document.getElementById(`msg-${id}`);
            if (el) el.remove();
        });

        socket.on('friend_request', (data) => {
            showToast(`طلب صداقة من ${data.from_username}`);
            loadFriendRequests();
        });
    }

    // ===== الأصدقاء =====
    async function loadFriends() {
        try {
            const res = await fetch(`${API_URL}/friends`, { headers: { 'authorization': token } });
            const friends = await res.json();
            const list = document.getElementById('friendsList');
            if (!friends.length) {
                list.innerHTML = '<div class="empty-list">ما عندك أصدقاء بعد<br>اضغط ➕ لإضافة صديق</div>';
                return;
            }
            list.innerHTML = friends.map(f => `
                <div class="friend-item" id="friend-${f.id}" onclick="openChat(${f.id}, '${f.username}')">
                    <div class="avatar">${f.username[0].toUpperCase()}</div>
                    <div class="friend-info">
                        <div class="friend-name">${f.username}</div>
                    </div>
                </div>
            `).join('');
        } catch { console.error('خطأ في جلب الأصدقاء'); }
    }

    // ===== طلبات الصداقة =====
    async function loadFriendRequests() {
        try {
            const res = await fetch(`${API_URL}/friend-requests`, { headers: { 'authorization': token } });
            const requests = await res.json();
            const badge = document.getElementById('requestsBadge');
            if (requests.length > 0) {
                badge.style.display = 'flex';
                badge.textContent = requests.length;
            } else {
                badge.style.display = 'none';
            }
            const list = document.getElementById('requestsList');
            if (!requests.length) {
                list.innerHTML = '<div class="empty-list">لا يوجد طلبات صداقة</div>';
                return;
            }
            list.innerHTML = requests.map(r => `
                <div class="request-item" id="req-${r.id}">
                    <div class="avatar">${r.username[0].toUpperCase()}</div>
                    <span>${r.username}</span>
                    <div class="req-btns">
                        <button class="accept-btn" onclick="respondRequest(${r.id}, 'accepted')">قبول</button>
                        <button class="reject-btn" onclick="respondRequest(${r.id}, 'rejected')">رفض</button>
                    </div>
                </div>
            `).join('');
        } catch { console.error('خطأ'); }
    }

    async function respondRequest(requestId, action) {
        try {
            await fetch(`${API_URL}/friend-response`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'authorization': token },
                body: JSON.stringify({ request_id: requestId, action })
            });
            document.getElementById(`req-${requestId}`)?.remove();
            if (action === 'accepted') {
                loadFriends();
                showToast('تمت إضافة الصديق! 🎉');
            }
            loadFriendRequests();
        } catch { console.error('خطأ'); }
    }

    // ===== البحث =====
    let searchTimeout;
    async function searchUsers() {
        const query = document.getElementById('searchInput').value.trim();
        const results = document.getElementById('searchResults');
        if (!query) { results.innerHTML = ''; return; }
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(async () => {
            try {
                const res = await fetch(`${API_URL}/search/${query}`, { headers: { 'authorization': token } });
                const users = await res.json();
                if (!users.length) { results.innerHTML = '<div class="empty-list">لا يوجد نتائج</div>'; return; }
                results.innerHTML = users.map(u => `
                    <div class="search-item">
                        <div class="avatar">${u.username[0].toUpperCase()}</div>
                        <span>${u.username}</span>
                        <button class="add-btn" id="add-${u.id}" onclick="sendFriendRequest(${u.id})">إضافة</button>
                    </div>
                `).join('');
            } catch { console.error('خطأ'); }
        }, 400);
    }

    async function sendFriendRequest(friendId) {
        const btn = document.getElementById(`add-${friendId}`);
        if (btn) { btn.disabled = true; btn.textContent = 'تم الإرسال'; }
        try {
            const res = await fetch(`${API_URL}/friend-request`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'authorization': token },
                body: JSON.stringify({ friend_id: friendId })
            });
            const data = await res.json();
            if (!res.ok) { showToast(data.error); if (btn) { btn.disabled = false; btn.textContent = 'إضافة'; } }
            else showToast('تم إرسال طلب الصداقة ✅');
        } catch { console.error('خطأ'); }
    }

    // ===== فتح محادثة =====
    async function openChat(friendId, friendUsername) {
        currentFriend = { id: friendId, username: friendUsername };
        document.querySelectorAll('.friend-item').forEach(el => el.classList.remove('active'));
        document.getElementById(`friend-${friendId}`)?.classList.add('active');
        document.getElementById('welcomeScreen').style.display = 'none';
        document.getElementById('chatHeader').style.display = 'flex';
        document.getElementById('messages').style.display = 'flex';
        document.getElementById('inputArea').style.display = 'flex';
        document.getElementById('friendName').textContent = friendUsername;
        document.getElementById('friendAvatar').textContent = friendUsername[0].toUpperCase();
        if (window.innerWidth <= 600) document.getElementById('sidebar').classList.add('hidden');
        await loadMessages();
        document.getElementById('msgInput').focus();
    }

    // ===== جلب الرسائل =====
    async function loadMessages() {
        if (!currentFriend) return;
        try {
            const res = await fetch(`${API_URL}/messages/${currentFriend.id}`, { headers: { 'authorization': token } });
            const msgs = await res.json();
            const container = document.getElementById('messages');
            container.innerHTML = '';
            msgs.forEach(m => appendMessage(m, false));
            container.scrollTop = container.scrollHeight;
        } catch { console.error('خطأ'); }
    }

    // ===== إضافة رسالة =====
    function appendMessage(msg, scroll = true) {
        const container = document.getElementById('messages');
        const isMine = msg.sender_id == myId;
        const time = new Date(msg.created_at).toLocaleTimeString('ar', { hour: '2-digit', minute: '2-digit' });
        const seen = isMine && msg.is_seen ? '<span class="seen-icon">✓✓</span>' : '';

        const wrapper = document.createElement('div');
        wrapper.className = `msg-wrapper ${isMine ? 'mine' : 'other'}`;
        wrapper.id = `msg-${msg.id}`;
        wrapper.innerHTML = `
            <div class="message">
                ${msg.content}
                <button class="delete-btn" onclick="deleteMessage(${msg.id})">✕</button>
            </div>
            <div class="msg-meta">
                <span class="msg-time">${time}</span>
                ${seen}
            </div>
        `;
        container.appendChild(wrapper);
        if (scroll) container.scrollTop = container.scrollHeight;
    }

    // ===== إرسال رسالة =====
    function sendMessage() {
        const input = document.getElementById('msgInput');
        const content = input.value.trim();
        if (!content || !currentFriend) return;
        input.value = '';
        socket.emit('send_message', { sender_id: myId, receiver_id: currentFriend.id, content });
    }

    // ===== حذف رسالة =====
    async function deleteMessage(id) {
        try {
            await fetch(`${API_URL}/message/${id}`, { method: 'DELETE', headers: { 'authorization': token } });
            document.getElementById(`msg-${id}`)?.remove();
        } catch { console.error('خطأ'); }
    }

    // ===== Panels =====
    function togglePanel(panelId) {
        const panel = document.getElementById(panelId);
        panel.classList.toggle('open');
        if (panelId === 'requestsPanel' && panel.classList.contains('open')) loadFriendRequests();
    }

    // ===== Toast =====
    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // ===== خروج =====
    function logout() {
        localStorage.removeItem('token');
        window.location.href = 'login.html';
    }

    function showSidebar() {
        document.getElementById('sidebar').classList.remove('hidden');
    }

    // ===== تشغيل =====
    connectSocket();
    loadFriends();
    loadFriendRequests();
</script>
</body>
</html>
