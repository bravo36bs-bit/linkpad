<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Falcon Office - Dashboard</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { background: #121212; color: #e0e0e0; font-family: sans-serif; margin: 0; display: flex; height: 100vh; }
        .sidebar { width: 300px; background: #1e1e1e; border-left: 1px solid #333; display: flex; flex-direction: column; }
        .chat-area { flex: 1; display: flex; flex-direction: column; }
        .friend-item { padding: 15px; border-bottom: 1px solid #333; cursor: pointer; transition: 0.3s; }
        .friend-item:hover { background: #2d2d2d; }
        .messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; }
        .msg { margin-bottom: 15px; padding: 10px 15px; border-radius: 10px; max-width: 70%; }
        .sent { background: #ffcc00; color: #000; align-self: flex-start; }
        .received { background: #333; color: #fff; align-self: flex-end; }
        .input-box { padding: 20px; background: #1e1e1e; display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; border-radius: 5px; border: none; background: #333; color: white; }
        button { padding: 10px 20px; background: #ffcc00; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
<div class="sidebar">
    <div style="padding: 20px; background: #ffcc00; color: #000; font-weight: bold;">الأصدقاء</div>
    <div id="friends-list"></div>
    <button onclick="logout()" style="margin: 10px; background: #ff4444; color: white;">تسجيل خروج</button>
</div>
<div class="chat-area">
    <div id="chat-header" style="padding: 15px; background: #1e1e1e; border-bottom: 1px solid #333;">اختر صديقاً</div>
    <div class="messages" id="messages-container"></div>
    <div class="input-box">
        <input type="text" id="msg-input" placeholder="اكتب رسالتك...">
        <button onclick="sendMessage()">إرسال</button>
    </div>
</div>
<script>
    const API = window.location.origin;
    const socket = io();
    const currentUser = JSON.parse(localStorage.getItem('fo_user'));
    let selectedFriend = null;

    if (!currentUser) window.location.href = 'login.html';

    async function apiRequest(endpoint) {
        const token = localStorage.getItem('fo_token');
        const res = await fetch(`${API}${endpoint}`, {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        if (res.status === 401) { window.location.href = 'login.html'; return; }
        return res.json();
    }

    socket.emit('register_socket', currentUser.id);

    async function loadFriends() {
        const friends = await apiRequest('/friends');
        const list = document.getElementById('friends-list');
        list.innerHTML = '';
        friends?.forEach(f => {
            const div = document.createElement('div');
            div.className = 'friend-item';
            div.innerText = f.username;
            div.onclick = () => {
                selectedFriend = f;
                document.getElementById('chat-header').innerText = `المحادثة مع: ${f.username}`;
                document.getElementById('messages-container').innerHTML = '';
            };
            list.appendChild(div);
        });
    }

    function sendMessage() {
        const input = document.getElementById('msg-input');
        const msg = input.value.trim();
        if (!msg || !selectedFriend) return;
        const data = { sender_id: currentUser.id, receiver_id: selectedFriend.id, message: msg };
        socket.emit('send_message', data);
        appendMessage(msg, 'sent');
        input.value = '';
    }

    socket.on('receive_message', (data) => {
        if (selectedFriend && data.sender_id === selectedFriend.id) appendMessage(data.message, 'received');
    });

    function appendMessage(text, type) {
        const container = document.getElementById('messages-container');
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.innerText = text;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    function logout() { localStorage.clear(); window.location.href = 'login.html'; }
    loadFriends();
</script>
</body>
</html>
