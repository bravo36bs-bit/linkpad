<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LinkPad Chat - الداشبورد</title>
    <style>
        :root {
            --bg-color: #02414d;
            --secondary-bg: rgba(255, 255, 255, 0.1);
            --accent-color: #08f169;
            --text-color: white;
            --sidebar-width: 300px;
            --received-msg: rgba(255, 255, 255, 0.15);
            --sent-msg: #08f169;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background: rgba(0, 0, 0, 0.3);
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--secondary-bg);
            height: 60px;
            box-sizing: border-box;
        }

        .main-wrapper {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        .sidebar {
            width: var(--sidebar-width);
            background: rgba(0, 0, 0, 0.15);
            border-left: 1px solid var(--secondary-bg);
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
        }

        .sidebar-header {
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.1);
        }

        .friends-list { flex: 1; overflow-y: auto; }

        .friend-item {
            padding: 12px 15px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .friend-item:hover { background: rgba(255, 255, 255, 0.05); }
        .friend-item.active { background: var(--secondary-bg); border-right: 4px solid var(--accent-color); }

        .avatar-circle {
            width: 45px; height: 45px;
            background: var(--accent-color);
            color: #02414d;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 18px;
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            background-blend-mode: overlay;
        }

        .chat-header {
            padding: 10px 15px;
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid var(--secondary-bg);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message {
            max-width: 85%;
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 15px;
            position: relative;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .sent { 
            align-self: flex-start; 
            background: var(--sent-msg); 
            color: #02414d; 
            border-top-right-radius: 2px;
        }

        .received { 
            align-self: flex-end; 
            background: var(--received-msg); 
            color: white; 
            border-top-left-radius: 2px;
        }

        .input-area {
            background: rgba(0, 0, 0, 0.3);
            padding: 10px 15px;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        #message-input {
            flex: 1;
            padding: 12px 18px;
            border-radius: 25px;
            border: none;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 16px;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                position: absolute;
                height: 100%;
                z-index: 500;
                right: 0;
            }
            .sidebar.hidden-mobile { transform: translateX(100%); }
            #back-btn { display: block !important; }
        }

        #back-btn { display: none; cursor: pointer; font-size: 20px; padding: 5px; }
        
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); }
        .modal-content { background: white; margin: 20% auto; width: 85%; max-width: 350px; border-radius: 20px; overflow: hidden; color: #333; }
        .search-box { padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .search-box input { padding: 12px; border: 1px solid #ddd; border-radius: 10px; }
        .search-box button { padding: 12px; border-radius: 10px; border: none; background: var(--bg-color); color: white; font-weight: bold; cursor: pointer; }
        .request-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; }
        .request-item button { background: var(--accent-color); border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <div style="display: flex; align-items: center; gap: 10px;">
            <div id="back-btn" onclick="backToSidebar()">➡️</div>
            <div class="user-info">
                <span id="username-display" style="color: var(--accent-color); font-weight: bold;">...</span>
            </div>
        </div>
        
        <div style="display: flex; align-items: center; gap: 15px;">
            <div class="notification-area" onclick="toggleNotifPanel()" style="position: relative; cursor: pointer;">
                <span style="font-size: 20px;">🔔</span>
                <span id="notif-count" class="badge" style="background: #ff4757; color: white; border-radius: 50%; padding: 2px 6px; position: absolute; top: -5px; right: -5px; font-size: 10px;">0</span>
                <div id="notif-panel" style="display:none; position:absolute; top:35px; left:0; width:220px; background:white; color:#333; border-radius:12px; padding:15px; box-shadow:0 10px 25px rgba(0,0,0,0.5); z-index: 3000;">
                    <h5 style="margin:0 0 10px 0; border-bottom: 1px solid #eee; padding-bottom: 5px;">طلبات الصداقة</h5>
                    <div id="requests-list" style="font-size:13px;">جاري التحميل...</div>
                </div>
            </div>
            <button onclick="logout()" style="background:rgba(255, 77, 77, 0.2); color:#ff4d4d; border:1px solid #ff4d4d; padding:4px 12px; border-radius:12px; font-size:12px; cursor: pointer;">خروج</button>
        </div>
    </header>

    <div class="main-wrapper">
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <h3 style="margin:0">المحادثات</h3>
                <button onclick="openSearchModal()" style="background:var(--accent-color); color:#02414d; width:35px; height:35px; border:none; border-radius:50%; font-size:24px; cursor:pointer;">+</button>
            </div>
            <div id="friends-list" class="friends-list"></div>
        </aside>

        <main class="chat-area">
            <div id="chat-header" class="chat-header">اختر صديقاً لبدء المراسلة</div>
            
            <div id="chat-container">
                <div style="margin:auto; opacity:0.3; text-align:center;">
                    <h2>LinkPad</h2>
                    <p>رسائلك محمية وآمنة</p>
                </div>
            </div>

            <div id="input-area" class="input-area" style="display: none;">
                <input type="text" id="message-input" placeholder="اكتب رسالة..." onkeypress="handleKey(event)">
                <button onclick="sendMessage()" style="background:var(--accent-color); border:none; width:45px; height:45px; border-radius:50%; cursor:pointer; font-size:18px;">🕊️</button>
            </div>
        </main>
    </div>

    <div id="searchModal" class="modal">
        <div class="modal-content">
            <div style="padding:15px; background:#f8f9fa; display:flex; justify-content:space-between; align-items:center;">
                <h4 style="margin:0">إضافة صديق جديد</h4>
                <span style="cursor:pointer; font-size:24px;" onclick="closeSearchModal()">&times;</span>
            </div>
            <div class="search-box">
                <input type="text" id="search-input-modal" placeholder="اسم المستخدم...">
                <button onclick="searchFriendModal()">بحث عن المستخدم</button>
                <div id="search-result"></div>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        let currentUser = null;
        let activeFriendId = null;

        window.onload = function() {
            if (!token) { window.location.href = 'login.html'; return; }
            try {
                currentUser = JSON.parse(atob(token.split('.')[1]));
                document.getElementById('username-display').innerText = currentUser.username;
                
                loadFriends();
                loadRequests();
                
                setInterval(() => {
                    if(activeFriendId) fetchMessages();
                    loadRequests();
                }, 4000);
            } catch (e) { logout(); }
        };

        function backToSidebar() {
            document.getElementById('sidebar').classList.remove('hidden-mobile');
            activeFriendId = null;
        }

        async function loadFriends() {
            try {
                const res = await fetch('/get-friends', { headers: { 'Authorization': `Bearer ${token}` } });
                if (res.ok) {
                    const friends = await res.json();
                    document.getElementById('friends-list').innerHTML = friends.map(f => `
                        <div class="friend-item ${activeFriendId === f.id ? 'active' : ''}" onclick="selectFriend(${f.id}, '${f.username}')">
                            <div class="avatar-circle">${f.username[0].toUpperCase()}</div>
                            <div style="flex:1">
                                <div style="font-weight:bold">${f.username}</div>
                                <div style="font-size:12px; opacity:0.6">انقر للمراسلة...</div>
                            </div>
                        </div>
                    `).join('');
                }
            } catch (e) { console.error("Error loading friends"); }
        }

        function selectFriend(id, name) {
            activeFriendId = id;
            document.getElementById('chat-header').innerHTML = `<b>${name}</b>`;
            document.getElementById('input-area').style.display = "flex";
            
            if (window.innerWidth <= 768) {
                document.getElementById('sidebar').classList.add('hidden-mobile');
            }
            
            fetchMessages();
            loadFriends(); 
        }

        async function fetchMessages() {
            if (!activeFriendId) return;
            try {
                const res = await fetch(`/get-messages/${activeFriendId}`, { headers: { 'Authorization': `Bearer ${token}` } });
                if (res.ok) {
                    const messages = await res.json();
                    const container = document.getElementById('chat-container');
                    container.innerHTML = messages.map(msg => {
                        const isMe = msg.sender_id === currentUser.id;
                        return `
                            <div class="message ${isMe ? 'sent' : 'received'}">
                                ${msg.content}
                                <div style="font-size:9px; opacity:0.6; margin-top:4px;">
                                    ${new Date(msg.created_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}
                                </div>
                            </div>
                        `;
                    }).join('');
                    container.scrollTop = container.scrollHeight;
                }
            } catch (e) { console.error("Error fetching messages"); }
        }

        async function sendMessage() {
            const input = document.getElementById('message-input');
            const val = input.value.trim();
            if (!val || !activeFriendId) return;
            try {
                const res = await fetch('/send-private-message', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ receiver_id: activeFriendId, message: val })
                });
                if (res.ok) { input.value = ""; fetchMessages(); }
            } catch (e) { console.error("Error sending message"); }
        }

        function handleKey(e) { if(e.key === "Enter") sendMessage(); }

        function openSearchModal() { document.getElementById('searchModal').style.display = "block"; }
        function closeSearchModal() { document.getElementById('searchModal').style.display = "none"; document.getElementById('search-result').innerHTML = ""; }

        async function searchFriendModal() {
            const q = document.getElementById('search-input-modal').value.trim();
            const resultDiv = document.getElementById('search-result');
            if(!q) return;
            try {
                const res = await fetch(`/search-user?query=${q}`, { headers: { 'Authorization': `Bearer ${token}` } });
                if (res.ok) {
                    const user = await res.json();
                    resultDiv.innerHTML = `
                        <div style="display:flex; justify-content:space-between; align-items:center; background:#f8f9fa; padding:12px; border-radius:12px; margin-top:10px; border:1px solid #eee;">
                            <span><b>${user.username}</b></span>
                            <button onclick="sendFriendRequest(${user.id})" style="background:#2ecc71; color:white; border:none; border-radius:8px; padding:6px 12px; cursor:pointer;">إضافة</button>
                        </div>`;
                } else { resultDiv.innerHTML = "<p style='color:red; text-align:center;'>المستخدم غير موجود</p>"; }
            } catch (e) { resultDiv.innerHTML = "<p style='color:red;'>خطأ في السيرفر</p>"; }
        }

        async function sendFriendRequest(id) {
            try {
                const res = await fetch('/send-friend-request', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ friend_id: id })
                });
                if (res.ok) { alert("تم إرسال الطلب!"); closeSearchModal(); }
                else { alert("الطلب موجود مسبقاً أو حدث خطأ"); }
            } catch (e) { alert("خطأ في الاتصال"); }
        }

        function toggleNotifPanel() {
            const p = document.getElementById('notif-panel');
            p.style.display = p.style.display === 'block' ? 'none' : 'block';
        }

        async function loadRequests() {
            try {
                const res = await fetch('/get-friend-requests', { headers: { 'Authorization': `Bearer ${token}` } });
                if (res.ok) {
                    const reqs = await res.json();
                    document.getElementById('notif-count').innerText = reqs.length;
                    const list = document.getElementById('requests-list');
                    if (reqs.length === 0) {
                        list.innerHTML = "لا توجد طلبات";
                        return;
                    }
                    list.innerHTML = reqs.map(r => `
                        <div class="request-item">
                            <span>${r.username}</span>
                            <button onclick="acceptFriend(${r.id})">قبول</button>
                        </div>
                    `).join('');
                }
            } catch (e) { console.error("Error loading requests"); }
        }

        async function acceptFriend(requestId) {
            try {
                const res = await fetch('/accept-friend', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ request_id: requestId })
                });
                if (res.ok) { loadRequests(); loadFriends(); }
            } catch (e) { console.error("Error accepting friend"); }
        }

        function logout() { localStorage.removeItem('token'); window.location.href = 'login.html'; }
    </script>
</body>
</html>
