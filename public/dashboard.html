<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LinkPad - المحادثات</title>
    <style>
    :root {
        
    --primary: #008080; /* تركوازي أساسي */
    --primary-light: #e0f2f1;
    --bg-app: #dadbd3;
    --chat-bg: #efe7dd;
    --white: #ffffff;
    --my-msg: #dcf8c6;
    }


    body {
   background-color: var(--bg-app);
    height: 100vh;
    margin: 0;
    display: flex;
    align-items: center; /* توسيط عمودي */
    justify-content: center; /* توسيط أفقي */
    font-family: 'Segoe UI', sans-serif;
    }
    .app-container {
    width: 95%; /* ياخذ عرض الشاشة مع ترك مسافة بسيطة */
    max-width: 1200px; /* لا يتوسع أكثر من اللازم على الشاشات الكبيرة */
    height: 95vh;
    background: var(--white);
    display: flex;
    flex-direction: column; /* الهيدر فوق والدردشة تحت */
    border-radius: 10px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    overflow: hidden;
}

    header {
      height: 60px; 
    background: var(--primary); /* اللون التركوازي */
    display: flex; 
    justify-content: space-between; 
    align-items: center;
    padding: 0 15px; 
    color: white;
    flex-shrink: 0;
    }

    
        .main-wrapper {
    flex: 1; /* ياخذ باقي مساحة الحاوية */
    display: flex;
    position: relative;
    overflow: hidden;
    }

    /* القائمة الجانبية */
    .sidebar {
        width: 100%; height: 100%;
        background: #fff;
        position: absolute; left: 0; top: 0;
        transition: transform 0.3s ease;
        z-index: 500;
        display: flex; flex-direction: column;
        border-left: 1px solid rgba(0,0,0,0.08);
    }

    .sidebar.hidden-mobile { transform: translateX(100%); }

    .sidebar-header {
        padding: 15px; background: #f0f2f5;
        display: flex; justify-content: space-between; align-items: center;
        border-bottom: 1px solid rgba(0,0,0,0.05);
    }

    /* منطقة المحادثة */
    .chat-area {
        width: 100%; height: 100%;
        display: flex; flex-direction: column;
        background: var(--wa-bg) url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
    }

    .chat-header {
        padding: 10px 15px; background: #f0f2f5;
        display: flex; align-items: center; gap: 10px;
        font-weight: bold; border-bottom: 1px solid rgba(0,0,0,0.05);
    }

    #back-btn { font-size: 20px; cursor: pointer; color: var(--wa-dark); display: none; }

    /* شكل الرسائل الجديد (WhatsApp Style) */
    #chat-container {
        flex: 1; overflow-y: auto; padding: 20px;
        display: flex; flex-direction: column; gap: 4px;
    }

    .message {
        max-width: 65%;
    padding: 8px 15px;
    border-radius: 12px; /* انحناء ألطف */
    font-size: 15px;
    margin-bottom: 5px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.1);
    }

    /* رسائلي (المرسلة) */
    .sent { 
       align-self: flex-start; 
    background: var(--my-msg); 
    border-top-right-radius: 2px;
    }

    /* رسائل الطرف الآخر (المستلمة) */
    .received { 
        align-self: flex-end; 
    background: var(--white); 
    border-top-left-radius: 2px;
    }

    .msg-time {
        font-size: 10px; color: #667781; margin-top: 4px; text-align: left;
    }

    /* منطقة الإدخال */
    .input-area {
        padding: 10px; background: #f0f2f5;
        display: flex; gap: 10px; align-items: center;
    }

    #message-input {
        flex: 1; border-radius: 25px; border: none; padding: 12px 20px;
        background: #fff; font-size: 16px; outline: none;
    }

    .send-btn {
        background: var(--wa-teal); color: white; border: none;
        width: 45px; height: 45px; border-radius: 50%;
        cursor: pointer; display: flex; align-items: center; justify-content: center;
    }

    /* قائمة الأصدقاء */
    .friend-item {
        display: flex; align-items: center; padding: 12px 15px;
        gap: 15px; border-bottom: 1px solid #f5f5f5; cursor: pointer;
        transition: 0.2s;
    }
    .friend-item:hover { background: #f5f6f6; }
    .avatar-circle {
        width: 45px; height: 45px; background: #dfe5e7; border-radius: 50%;
        display: flex; align-items: center; justify-content: center; font-weight: bold;
    }

    @media (min-width: 769px) {
        .sidebar { width: 30%; position: static; transform: none !important; }
        .chat-area { width: 70%; }
        #back-btn { display: none !important; }
    }
    </style>
</head>
<body>
<div class="app-container"></div>
    <header>
        <div style="display: flex; align-items: center; gap: 10px;">
            <span id="back-btn" onclick="backToSidebar()">➡️</span>
            <span id="username-display" style="font-weight: bold;">LinkPad</span>
        </div>
        
        <div style="display: flex; align-items: center; gap: 15px;">
            <div onclick="toggleNotifPanel()" style="position: relative; cursor: pointer;">
                <span>🔔</span>
                <span id="notif-count" style="background: var(--wa-green); color: white; border-radius: 50%; padding: 2px 6px; position: absolute; top: -8px; right: -8px; font-size: 10px;">0</span>
                <div id="notif-panel" style="display:none; position:absolute; top:35px; left:0; width:220px; background:white; color:#333; border-radius:8px; padding:15px; box-shadow:0 5px 15px rgba(0,0,0,0.2); z-index: 3000;">
                    <h5 style="margin:0 0 10px 0;">طلبات الصداقة</h5>
                    <div id="requests-list" style="font-size:13px;">جاري التحميل...</div>
                </div>
            </div>
            <button onclick="logout()" style="background:transparent; color:#ff4d4d; border:1px solid #ff4d4d; padding:4px 10px; border-radius:5px; font-size:12px; cursor: pointer;">خروج</button>
        </div>
    </header>

    <div class="main-wrapper">
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <h3 style="margin:0; font-size:18px;">المحادثات</h3>
                <button onclick="openSearchModal()" style="background:var(--wa-teal); color:white; width:35px; height:35px; border:none; border-radius:50%; font-size:20px; cursor:pointer;">+</button>
            </div>
            <div id="friends-list" style="overflow-y:auto;"></div>
        </aside>

        <main class="chat-area">
            <div id="chat-header-info" class="chat-header">
                <div id="chat-title">اختر محادثة للبدء</div>
            </div>
            
            <div id="chat-container">
                <div style="margin:auto; text-align:center; opacity:0.5;">
                    <h2>LinkPad</h2>
                    <p>استخدم هذا التطبيق للمراسلة الفورية الآمنة</p>
                </div>
            </div>

            <div id="input-area" class="input-area" style="display: none;">
                <input type="text" id="message-input" placeholder="اكتب رسالة..." onkeypress="handleKey(event)">
                <button class="send-btn" onclick="sendMessage()">🕊️</button>
            </div>
        </main>
    </div>

    <div id="searchModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:4000;">
        <div style="background:white; max-width:90%; width:350px; margin:100px auto; border-radius:15px; overflow:hidden;">
            <div style="padding:15px; background:#f0f2f5; display:flex; justify-content:space-between;">
                <b>إضافة صديق</b>
                <span onclick="closeSearchModal()" style="cursor:pointer;">&times;</span>
            </div>
            <div style="padding:20px;">
                <input type="text" id="search-input-modal" placeholder="اسم المستخدم..." style="width:100%; padding:10px; border:1px solid #ddd; border-radius:8px; box-sizing:border-box;">
                <button onclick="searchFriendModal()" style="width:100%; margin-top:10px; background:var(--wa-teal); color:white; border:none; padding:10px; border-radius:8px;">بحث</button>
                <div id="search-result" style="margin-top:15px;"></div>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        let currentUser = null;
        let activeFriendId = null;

        window.onload = function() {
            // منع الرجوع لصفحة تسجيل الدخول إذا كان المستخدم مسجل دخول فعلياً
if (window.location.pathname.includes('dashboard.html') && localStorage.getItem('token')) {
    history.pushState(null, null, location.href);
    window.onpopstate = function () {
        // إذا كان على الموبايل والسايد بار مخفي، خليه يرجع يظهر السايد بار بدل ما يخرج
        if (window.innerWidth <= 768 && document.getElementById('sidebar').classList.contains('hidden-mobile')) {
            backToSidebar();
            history.pushState(null, null, location.href);
        } else {
            // إذا كان في السايد بار أصلاً، يبقى في الصفحة
            history.pushState(null, null, location.href);
        }
    };
}
            if (!token) { window.location.href = 'login.html'; return; }
            try {
                currentUser = JSON.parse(atob(token.split('.')[1]));
                loadFriends();
                loadRequests();
                setInterval(() => {
                    if(activeFriendId) fetchMessages();
                    loadRequests();
                }, 3000);
            } catch (e) { logout(); }
        };

        function backToSidebar() {
            document.getElementById('sidebar').classList.remove('hidden-mobile');
            document.getElementById('back-btn').style.display = "none";
            activeFriendId = null;
            document.getElementById('chat-title').innerText = "اختر محادثة للبدء";
    document.getElementById('input-area').style.display = "none"
        }

        async function loadFriends() {
            const res = await fetch('/get-friends', { headers: { 'Authorization': `Bearer ${token}` } });
            if (res.ok) {
                const friends = await res.json();
                document.getElementById('friends-list').innerHTML = friends.map(f => `
                    <div class="friend-item" onclick="selectFriend(${f.id}, '${f.username}')">
                        <div class="avatar-circle">${f.username[0].toUpperCase()}</div>
                        <div>
                            <div style="font-weight:bold">${f.username}</div>
                            <div style="font-size:12px; color:#667781">اضغط للتحدث</div>
                        </div>
                    </div>
                `).join('');
            }
        }

        function selectFriend(id, name) {
            activeFriendId = id;
            document.getElementById('chat-title').innerText = name;
            document.getElementById('input-area').style.display = "flex";
            if (window.innerWidth <= 768) {
                document.getElementById('sidebar').classList.add('hidden-mobile');
                document.getElementById('back-btn').style.display = "block";
            }
            fetchMessages();
        }

        async function fetchMessages() {
            if (!activeFriendId) return;
            const res = await fetch(`/get-messages/${activeFriendId}`, { headers: { 'Authorization': `Bearer ${token}` } });
            if (res.ok) {
                const messages = await res.json();
                const container = document.getElementById('chat-container');
                container.innerHTML = messages.map(msg => {
                    const isMe = msg.sender_id === currentUser.id;
                    const time = new Date(msg.created_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                    return `
                        <div class="message ${isMe ? 'sent' : 'received'}">
                            ${msg.content}
                            <div class="msg-time">${time}</div>
                        </div>
                    `;
                }).join('');
                container.scrollTop = container.scrollHeight;
            }
        }

        async function sendMessage() {
            const input = document.getElementById('message-input');
            const val = input.value.trim();
            if (!val || !activeFriendId) return;
            const res = await fetch('/send-private-message', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ receiver_id: activeFriendId, message: val })
            });
            if (res.ok) { input.value = ""; fetchMessages(); }
        }

        function handleKey(e) { if(e.key === "Enter") sendMessage(); }
        function openSearchModal() { document.getElementById('searchModal').style.display = "block"; }
        function closeSearchModal() { document.getElementById('searchModal').style.display = "none"; }
        function toggleNotifPanel() { 
            const p = document.getElementById('notif-panel');
            p.style.display = p.style.display === 'block' ? 'none' : 'block';
        }
        function logout() { localStorage.removeItem('token'); window.location.href = 'login.html'; }

        // الدوال الباقية (البحث والطلبات) تظل كما هي مع تحسينات طفيفة في التنسيق
        async function searchFriendModal() {
            const q = document.getElementById('search-input-modal').value.trim();
            const res = await fetch(`/search-user?query=${q}`, { headers: { 'Authorization': `Bearer ${token}` } });
            const div = document.getElementById('search-result');
            if(res.ok) {
                const user = await res.json();
                div.innerHTML = `<div style="display:flex; justify-content:space-between; align-items:center; background:#f0f2f5; padding:10px; border-radius:8px;">
                    <span>${user.username}</span>
                    <button onclick="sendFriendRequest(${user.id})" style="background:var(--wa-green); border:none; padding:5px 10px; border-radius:5px; color:white;">إضافة</button>
                </div>`;
            } else { div.innerHTML = "<p style='color:red'>لم يتم العثور عليه</p>"; }
        }

        async function sendFriendRequest(id) {
            const res = await fetch('/send-friend-request', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ friend_id: id })
            });
            if(res.ok) { alert("تم الطلب!"); closeSearchModal(); }
        }

        async function loadRequests() {
            const res = await fetch('/get-friend-requests', { headers: { 'Authorization': `Bearer ${token}` } });
            if(res.ok) {
                const reqs = await res.json();
                document.getElementById('notif-count').innerText = reqs.length;
                document.getElementById('requests-list').innerHTML = reqs.map(r => `
                    <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                        <span>${r.username}</span>
                        <button onclick="acceptFriend(${r.id})" style="background:var(--wa-teal); color:white; border:none; padding:2px 8px; border-radius:4px;">قبول</button>
                    </div>
                `).join('') || "لا توجد طلبات";
            }
        }

        async function acceptFriend(rid) {
            const res = await fetch('/accept-friend', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ request_id: rid })
            });
            if(res.ok) { loadRequests(); loadFriends(); }
        }
    </script>
</body>
</html>
