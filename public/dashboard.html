<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LinkPad - نبض</title>
    <style>
        :root {
            --bg-dark: #121826;
            --bg-sidebar: #1a2232;
            --primary-accent: #008080;
            --primary-glow: rgba(0, 128, 128, 0.3);
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --card-hover: #262f3f;
            --my-msg: #008080;
            --received-msg: #1f2937;
        }

        body {
            background-color: var(--bg-dark);
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-main);
            overflow: hidden;
        }

        .app-container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        @media (min-width: 900px) {
            .app-container {
                width: 95%;
                max-width: 1400px;
                height: 95vh;
                border-radius: 20px;
                box-shadow: 0 20px 50px rgba(0,0,0,0.5);
                border: 1px solid rgba(255,255,255,0.05);
            }
        }

        header {
            height: 70px;
            background: var(--bg-sidebar);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 25px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            z-index: 1000;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-icon {
            background: linear-gradient(135deg, var(--primary-accent), #00b3b3);
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px var(--primary-glow);
        }

        .main-wrapper {
            flex: 1;
            display: flex;
            position: relative;
            overflow: hidden;
        }

        .sidebar {
            width: 100%;
            height: 100%;
            background: var(--bg-sidebar);
            position: absolute;
            left: 0;
            top: 0;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 500;
            display: flex;
            flex-direction: column;
        }

        .sidebar.hidden-mobile { transform: translateX(100%); }

        .search-bar-container { padding: 20px; }

        .search-bar {
            background: #262f3f;
            border-radius: 12px;
            display: flex;
            align-items: center;
            padding: 10px 15px;
            gap: 10px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .search-bar input {
            background: transparent;
            border: none;
            color: white;
            outline: none;
            width: 100%;
        }

        .friend-item {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            gap: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        .friend-item:hover { background: var(--card-hover); }
        .friend-item.active { background: var(--card-hover); border-right: 4px solid var(--primary-accent); }

        .avatar-circle {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 20px;
            color: white;
        }

        .chat-area {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: var(--bg-dark);
        }

        .chat-header {
            padding: 15px 25px;
            background: var(--bg-sidebar);
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.5;
        }

        .sent { align-self: flex-start; background: var(--my-msg); color: white; border-bottom-right-radius: 4px; }
        .received { align-self: flex-end; background: var(--received-msg); color: var(--text-main); border-bottom-left-radius: 4px; }

        .input-area { padding: 20px; background: var(--bg-sidebar); display: flex; gap: 15px; }

        #message-input {
            flex: 1;
            background: #262f3f;
            border: none;
            border-radius: 15px;
            padding: 15px 20px;
            color: white;
            outline: none;
        }

        .send-btn {
            background: var(--primary-accent);
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 0 4px 15px var(--primary-glow);
        }

        @media (min-width: 769px) {
            .sidebar { width: 350px; position: static; transform: none !important; border-left: 1px solid rgba(255,255,255,0.05); }
            .chat-area { flex: 1; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <div class="logo-area">
            <span id="back-btn" onclick="backToSidebar()" style="display:none; cursor:pointer; font-size: 20px;">➡️</span>
            <div class="logo-icon">💬</div>
            <span style="font-weight: bold; font-size: 20px;">LinkPad</span>
        </div>
        
        <div style="display: flex; align-items: center; gap: 15px;">
            <div onclick="toggleNotifPanel()" style="position: relative; cursor: pointer;">
                <span style="font-size: 22px;">🔔</span>
                <span id="notif-count" style="background: #ef4444; color: white; border-radius: 50%; padding: 2px 6px; position: absolute; top: -5px; right: -5px; font-size: 10px;">0</span>
                <div id="notif-panel" style="display:none; position:absolute; top:40px; left:0; width:250px; background:var(--bg-sidebar); border:1px solid rgba(255,255,255,0.1); border-radius:12px; padding:15px; z-index: 3000;">
                    <h5 style="margin:0 0 10px 0;">طلبات الصداقة</h5>
                    <div id="requests-list"></div>
                </div>
            </div>
            <button onclick="logout()" style="background:rgba(239, 68, 68, 0.1); color:#ef4444; border:none; padding:8px 12px; border-radius:10px; cursor: pointer;">خروج</button>
        </div>
    </header>

    <div class="main-wrapper">
        <aside id="sidebar" class="sidebar">
            <div class="search-bar-container">
                <button onclick="openSearchModal()" style="width:100%; background:var(--primary-accent); color:white; border:none; padding:12px; border-radius:12px; font-weight:600; cursor:pointer;">+ إضافة صديق</button>
            </div>
            <div id="friends-list" style="overflow-y:auto; flex:1;"></div>
        </aside>

        <main class="chat-area">
            <div class="chat-header">
                <div id="chat-title" style="font-weight: 600;">اختر محادثة</div>
            </div>
            <div id="chat-container">
                <div style="margin:auto; text-align:center; opacity:0.3;">
                    <div style="font-size: 50px;">🛡️</div>
                    <p>المحادثات مشفرة بالكامل</p>
                </div>
            </div>
            <div id="input-area" class="input-area" style="display: none;">
                <input type="text" id="message-input" placeholder="اكتب هنا..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button class="send-btn" onclick="sendMessage()">🚀</button>
            </div>
        </main>
    </div>
</div>

<div id="searchModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:4000; align-items: center; justify-content: center;">
    <div style="background:var(--bg-sidebar); width:90%; max-width:350px; border-radius:20px; padding:20px;">
        <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
            <b>بحث عن صديق</b>
            <span onclick="closeSearchModal()" style="cursor:pointer;">&times;</span>
        </div>
        <input type="text" id="search-input-modal" placeholder="يوزر نيم..." style="width:100%; padding:12px; background:#262f3f; border:none; border-radius:10px; color:white; box-sizing: border-box;">
        <button onclick="searchFriendModal()" style="width:100%; margin-top:10px; background:var(--primary-accent); border:none; padding:12px; border-radius:10px; color:white; cursor:pointer;">بحث</button>
        <div id="search-result" style="margin-top:15px;"></div>
    </div>
</div>

<script>
    const API_URL = 'https://linkpad-chat.onrender.com';
    const token = localStorage.getItem('token');
    let currentUser = null;
    let activeFriendId = null;

    window.onload = function() {
        if (!token) { window.location.href = 'login.html'; return; }
        try {
            const base64Url = token.split('.')[1];
            currentUser = JSON.parse(window.atob(base64Url.replace(/-/g, '+').replace(/_/g, '/')));
            loadFriends();
            loadRequests();
            setInterval(() => {
                if(activeFriendId) fetchMessages();
                loadRequests();
            }, 3000);
        } catch (e) { logout(); }
    };

    async function loadFriends() {
        const res = await fetch(`${API_URL}/get-friends`, { headers: { 'Authorization': `Bearer ${token}` } });
        if (res.ok) {
            const friends = await res.json();
            document.getElementById('friends-list').innerHTML = friends.map(f => `
                <div class="friend-item ${activeFriendId === f.id ? 'active' : ''}" onclick="selectFriend(${f.id}, '${f.username}')">
                    <div class="avatar-circle" style="background:linear-gradient(45deg, #008080, #00b3b3)">${f.username[0].toUpperCase()}</div>
                    <div class="friend-info">
                        <div class="name">${f.username}</div>
                        <div style="font-size:12px; color:var(--text-muted);">متصل</div>
                    </div>
                </div>
            `).join('');
        }
    }

    function selectFriend(id, name) {
        activeFriendId = id;
        document.getElementById('chat-title').innerText = name;
        document.getElementById('input-area').style.display = "flex";
        if (window.innerWidth <= 768) {
            document.getElementById('sidebar').classList.add('hidden-mobile');
            document.getElementById('back-btn').style.display = "block";
        }
        fetchMessages();
    }

    async function fetchMessages() {
        if (!activeFriendId) return;
        const res = await fetch(`${API_URL}/get-messages/${activeFriendId}`, { headers: { 'Authorization': `Bearer ${token}` } });
        if (res.ok) {
            const messages = await res.json();
            const container = document.getElementById('chat-container');
            const html = messages.map(msg => `
                <div class="message ${msg.sender_id === currentUser.id ? 'sent' : 'received'}">
                    ${msg.content}
                </div>
            `).join('');
            if (container.dataset.lastCount != messages.length) {
                container.innerHTML = html;
                container.dataset.lastCount = messages.length;
                container.scrollTop = container.scrollHeight;
            }
        }
    }

    async function sendMessage() {
        const input = document.getElementById('message-input');
        const content = input.value.trim();
        if (!content || !activeFriendId) return;
        const res = await fetch(`${API_URL}/send-private-message`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
            body: JSON.stringify({ receiver_id: activeFriendId, message: content })
        });
        if (res.ok) { input.value = ""; fetchMessages(); }
    }

    async function searchFriendModal() {
        const q = document.getElementById('search-input-modal').value.trim();
        const res = await fetch(`${API_URL}/search-user?query=${q}`, { headers: { 'Authorization': `Bearer ${token}` } });
        const div = document.getElementById('search-result');
        if(res.ok) {
            const user = await res.json();
            div.innerHTML = `<div style="display:flex; justify-content:space-between; align-items:center; background:#262f3f; padding:10px; border-radius:10px;">
                <span>${user.username}</span>
                <button onclick="sendFriendRequest(${user.id})" style="background:var(--primary-accent); border:none; padding:5px 10px; border-radius:5px; color:white; cursor:pointer;">إضافة</button>
            </div>`;
        } else { div.innerHTML = "غير موجود"; }
    }

    async function sendFriendRequest(id) {
        await fetch(`${API_URL}/send-friend-request`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
            body: JSON.stringify({ friend_id: id })
        });
        alert("تم الإرسال"); closeSearchModal();
    }

    async function loadRequests() {
        const res = await fetch(`${API_URL}/get-friend-requests`, { headers: { 'Authorization': `Bearer ${token}` } });
        if(res.ok) {
            const reqs = await res.json();
            document.getElementById('notif-count').innerText = reqs.length;
            document.getElementById('requests-list').innerHTML = reqs.map(r => `
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                    <span>${r.username}</span>
                    <button onclick="acceptFriend(${r.id})" style="background:var(--primary-accent); border:none; padding:4px 8px; border-radius:5px; color:white; cursor:pointer;">قبول</button>
                </div>
            `).join('');
        }
    }

    async function acceptFriend(rid) {
        await fetch(`${API_URL}/accept-friend`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
            body: JSON.stringify({ request_id: rid })
        });
        loadRequests(); loadFriends();
    }

    function backToSidebar() { document.getElementById('sidebar').classList.remove('hidden-mobile'); document.getElementById('back-btn').style.display = "none"; activeFriendId = null; }
    function openSearchModal() { document.getElementById('searchModal').style.display = "flex"; }
    function closeSearchModal() { document.getElementById('searchModal').style.display = "none"; }
    function toggleNotifPanel() { const p = document.getElementById('notif-panel'); p.style.display = p.style.display === 'block' ? 'none' : 'block'; }
    function logout() { localStorage.clear(); window.location.href = 'login.html'; }
</script>
</body>
</html>
